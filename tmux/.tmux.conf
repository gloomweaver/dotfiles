# ══════════════════════════════════════════════════════════
#  Tmux Config — Catppuccin Mocha
# ══════════════════════════════════════════════════════════

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"
set -ag terminal-overrides ",*:Smulx=\E[4::%p1%dm"  # undercurl
set -ag terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"  # undercurl colors
set -ag terminal-overrides ",*:smxx=\E[9m,*:rmxx=\E[29m"  # strikethrough
set -g allow-passthrough on

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u
set -g status-interval 5
set -g detach-on-destroy off       # switch to another session on close

# ── Prefix ───────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Navigation ───────────────────────────────────────────
# Split panes (open in current path)
bind \\ split-window -h -c "#{pane_current_path}"   # no shift needed (\ not |)
bind -  split-window -v -c "#{pane_current_path}"
bind c  new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation — Alt+h/j/k/l without prefix (fastest)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Prefix + h/j/k/l still works as fallback
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes — Alt+Shift+h/j/k/l without prefix (repeatable)
bind -n M-H resize-pane -L 3
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 3

# Window switching — Alt+[ / Alt+] without prefix
bind -n M-[ previous-window
bind -n M-] next-window

# Alt+1-9 to jump to window directly (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Move windows
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# ── Copy mode (vi) ──────────────────────────────────────
setw -g mode-keys vi
bind Y copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Reload config ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Popup terminal ───────────────────────────────────────
bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# ══════════════════════════════════════════════════════════
#  Catppuccin Mocha — hand-crafted status bar
# ══════════════════════════════════════════════════════════
# Palette
#   base     #1e1e2e    surface0 #313244    surface1 #45475a
#   text     #cdd6f4    subtext0 #a6adc8    overlay0 #6c7086
#   blue     #89b4fa    lavender #b4befe    mauve    #cba6f7
#   green    #a6e3a1    peach    #fab387    red      #f38ba8
#   yellow   #f9e2af    teal     #94e2d5    sky      #89dceb
#   pink     #f5c2e7    flamingo #f2cdcd    rosewater#f5e0dc

# ── Pane borders ─────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g popup-border-lines rounded

# ── Message / command line ───────────────────────────────
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# ── Copy mode highlight ─────────────────────────────────
set -g mode-style "bg=#45475a,fg=#cdd6f4"

# ── Status bar ───────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: user · hostname · time
set -g status-right-length 80
set -g status-right "#[fg=#313244]#[bg=#313244,fg=#a6adc8]  #(whoami) #[fg=#45475a]#[bg=#45475a,fg=#cdd6f4]  #H #[fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e,bold]  %H:%M "

# Window tabs
set -g status-justify left
set -g window-status-separator ""

# Inactive window
set -g window-status-format "#[fg=#1e1e2e,bg=#313244]#[fg=#a6adc8,bg=#313244] #I  #W #[fg=#313244,bg=#1e1e2e]"

# Active window
set -g window-status-current-format "#[fg=#1e1e2e,bg=#45475a]#[fg=#cdd6f4,bg=#45475a,bold] #I  #W#{?window_zoomed_flag,  ,} #[fg=#45475a,bg=#1e1e2e]"

# ══════════════════════════════════════════════════════════
#  Plugins (TPM)
# ══════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Resurrect: save/restore sessions across restarts
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-processes 'nvim lazygit pi'
set -g @resurrect-strategy-nvim 'session'

# Continuum: auto-save every 15 min, auto-restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
